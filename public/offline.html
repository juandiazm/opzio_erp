<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin conexión - Opzio ERP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0066cc 0%, #004499 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .offline-container {
            max-width: 500px;
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
            font-weight: 600;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .retry-button {
            background: white;
            color: #0066cc;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
        }
        .retry-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,255,255,0.3);
        }
        .logo {
            width: 150px;
            height: 150px;
            margin: 0 auto 30px;
            background: white;
            border-radius: 50%;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="logo">
            <img src="/images/opzio-monogram-circle-purple-bg-transparent.webp" alt="Opzio" style="width: 100%; height: 100%; object-fit: contain;">
        </div>
        <div class="offline-icon">📡</div>
        <h1>Sin Conexión</h1>
        <p>No hay conexión a internet en este momento. Por favor, verifica tu conexión e intenta nuevamente.</p>
        <button class="retry-button" onclick="location.reload()">Reintentar</button>
    </div>

    <script>
        // Intentar reconectar cada 5 segundos
        setInterval(() => {
            if (navigator.onLine) {
                location.reload();
            }
        }, 5000);
    </script>
</body>
</html>
