name: Deploy Laravel App to GCP

on:
  push:
    branches:
      - qa  # Replace 'qa' with the branch to deploy.

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Cache node modules
      uses: actions/cache@v3
      id: npm-cache
      with:
        path: |
          ~/.npm
          node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-fontawesome-pro
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Configure FontAwesome Pro credentials 
      env:
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        # Configure FontAwesome Pro registry and credentials
        npm config set @fortawesome:registry https://npm.fontawesome.com/
        npm config set //npm.fontawesome.com/:_authToken ${NPM_TOKEN}
        
        # Create .npmrc in home directory with FontAwesome credentials
        echo "@fortawesome:registry=https://npm.fontawesome.com/" >> ~/.npmrc
        echo "//npm.fontawesome.com/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        
        # Also configure in project directory
        echo "@fortawesome:registry=https://npm.fontawesome.com/" > .npmrc
        echo "//npm.fontawesome.com/:_authToken=${NPM_TOKEN}" >> .npmrc

    - name: Install dependencies (with cache optimization)
      run: |
        if [ "${{ steps.npm-cache.outputs.cache-hit }}" != "true" ]; then
          echo "Cache miss - installing dependencies"
          npm ci --prefer-offline --no-audit
        else
          echo "Cache hit - verifying node_modules integrity"
          # Verify node_modules integrity
          if [ ! -d "node_modules" ] || [ ! -f "node_modules/.package-lock.json" ]; then
            echo "Node modules corrupted - reinstalling"
            npm ci --prefer-offline --no-audit
          else
            echo "Node modules cache is valid, skipping npm install"
          fi
        fi

    - name: Build project
      run: |
        npm run production
    
    - name: Package build for deployment
      run: |
        tar -czf build.tar.gz app bootstrap config database resources composer.json composer.lock artisan routes

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add server to known_hosts
      run: |
        ssh-keyscan -H 34.82.192.32 >> ~/.ssh/known_hosts

    - name: Ensure deployment directory exists
      run: |
        ssh -o StrictHostKeyChecking=no git@34.82.192.32 'sudo mkdir -p /var/www/html/ridder_erp_qa && sudo chmod -R 777 /var/www/html/ridder_erp_qa'
    
    - name: Deploy storage directory
      run: |
        if ssh -o StrictHostKeyChecking=no git@34.82.192.32 '[ ! -d "/var/www/html/ridder_erp_qa/storage" ]'; then
          echo "Storage directory not found. Copying from repository..."
          scp -r ./storage git@34.82.192.32:/var/www/html/ridder_erp_qa/
          ssh -o StrictHostKeyChecking=no git@34.82.192.32 'sudo chmod -R 777 /var/www/html/ridder_erp_qa/storage'
        else
          echo "Storage directory exists. Nothing to do."
        fi

    - name: Deploy public directory
      run: |
        if ssh -o StrictHostKeyChecking=no git@34.82.192.32 '[ ! -d "/var/www/html/ridder_erp_qa/public" ]'; then
          echo "Public directory not found. Copying from repository..."
          scp -r ./public git@34.82.192.32:/var/www/html/ridder_erp_qa/
        else
          ssh -o StrictHostKeyChecking=no git@34.82.192.32 'sudo rm -rf /var/www/html/ridder_erp_qa/public/css /var/www/html/ridder_erp_qa/public/js /var/www/html/ridder_erp_qa/public/fonts /var/www/html/ridder_erp_qa/public/images/payment-gateways'
          scp -r ./public/css git@34.82.192.32:/var/www/html/ridder_erp_qa/public
          scp -r ./public/js git@34.82.192.32:/var/www/html/ridder_erp_qa/public
          scp -r ./public/fonts git@34.82.192.32:/var/www/html/ridder_erp_qa/public
          ssh -o StrictHostKeyChecking=no git@34.82.192.32 'sudo mkdir -p /var/www/html/ridder_erp_qa/public/images'
          scp -r ./public/images/payment-gateways git@34.82.192.32:/var/www/html/ridder_erp_qa/public/images/
        fi
        ssh -o StrictHostKeyChecking=no git@34.82.192.32 'sudo chmod -R 777 /var/www/html/ridder_erp_qa/public'
        

    - name: Deploy .env file
      run: |
        if ssh -o StrictHostKeyChecking=no git@34.82.192.32 '[ ! -f "/var/www/html/ridder_erp_qa/.env" ]'; then
          echo ".env file not found. Copying from repository..."
          scp .env_temp git@34.82.192.32:/var/www/html/ridder_erp_qa/.env
        fi

    - name: Deploy to server
      run: |
        scp build.tar.gz git@34.82.192.32:/var/www/html/ridder_erp_qa
        ssh git@34.82.192.32 << 'EOF'
        cd /var/www/html/ridder_erp_qa
        tar -xzf build.tar.gz
        sudo update-alternatives --set php /usr/bin/php8.1
        curl -sS https://getcomposer.org/installer | php
        php8.1 composer.phar install --no-dev --optimize-autoloader
        composer install --no-dev --optimize-autoloader
        php8.1 artisan migrate --force
        php8.1 artisan storage:link
        php8.1 artisan config:clear
        php8.1 artisan route:cache
        php8.1 artisan view:cache
        sudo update-alternatives --set php /usr/bin/php8.3
        rm build.tar.gz
        EOF

    - name: Setting ownership
      run: |
        ssh -o StrictHostKeyChecking=no git@34.82.192.32 'sudo chown -R www-data:www-data /var/www/html/ridder_erp_qa'

    
