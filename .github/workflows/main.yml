name: Deploy Laravel App to GCP

on:
  push:
    branches:
      - main  # Replace 'main' with the branch to deploy.

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Cache node modules
      uses: actions/cache@v3
      id: npm-cache
      with:
        path: |
          ~/.npm
          node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}-fontawesome-pro
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Configure FontAwesome Pro credentials 
      env:
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        # Configure FontAwesome Pro registry and credentials
        npm config set @fortawesome:registry https://npm.fontawesome.com/
        npm config set //npm.fontawesome.com/:_authToken ${NPM_TOKEN}
        
        # Create .npmrc in home directory with FontAwesome credentials
        echo "@fortawesome:registry=https://npm.fontawesome.com/" >> ~/.npmrc
        echo "//npm.fontawesome.com/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        
        # Also configure in project directory
        echo "@fortawesome:registry=https://npm.fontawesome.com/" > .npmrc
        echo "//npm.fontawesome.com/:_authToken=${NPM_TOKEN}" >> .npmrc

    - name: Install dependencies (with cache optimization)
      run: |
        if [ "${{ steps.npm-cache.outputs.cache-hit }}" != "true" ]; then
          echo "Cache miss - installing dependencies"
          npm ci --prefer-offline --no-audit
        else
          echo "Cache hit - verifying node_modules integrity"
          # Verify node_modules integrity
          if [ ! -d "node_modules" ] || [ ! -f "node_modules/.package-lock.json" ]; then
            echo "Node modules corrupted - reinstalling"
            npm ci --prefer-offline --no-audit
          else
            echo "Node modules cache is valid, skipping npm install"
          fi
        fi

    - name: Build project
      run: |
        npm run build
    
    - name: Package build for deployment
      run: |
        tar -czf build.tar.gz app bootstrap config database public/build resources composer.json composer.lock artisan routes \
          public/manifest.json public/service-worker.js public/favicon.ico public/apple-touch-icon.png public/offline.html

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add server to known_hosts
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        ssh-keyscan -T 10 -H 35.239.181.103 >> ~/.ssh/known_hosts || true

    - name: Ensure deployment directory exists
      run: |
        ssh -o StrictHostKeyChecking=no git@35.239.181.103 'sudo mkdir -p /var/www/html/opzio_erp && sudo chmod -R 777 /var/www/html/opzio_erp'
    
    - name: Deploy storage directory
      run: |
        if ssh -o StrictHostKeyChecking=no git@35.239.181.103 '[ ! -d "/var/www/html/opzio_erp/storage" ]'; then
          echo "Storage directory not found. Copying from repository..."
          scp -r ./storage git@35.239.181.103:/var/www/html/opzio_erp/
          ssh -o StrictHostKeyChecking=no git@35.239.181.103 'sudo chmod -R 777 /var/www/html/opzio_erp/storage'
        else
          echo "Storage directory exists. Nothing to do."
        fi

    - name: Deploy public directory
      run: |
        if ssh -o StrictHostKeyChecking=no git@35.239.181.103 '[ ! -d "/var/www/html/opzio_erp/public" ]'; then
          echo "Public directory not found. Copying from repository..."
          scp -r ./public git@35.239.181.103:/var/www/html/opzio_erp/
        else
          ssh -o StrictHostKeyChecking=no git@35.239.181.103 'sudo rm -rf /var/www/html/opzio_erp/public/build /var/www/html/opzio_erp/public/fonts /var/www/html/opzio_erp/public/images/payment-gateways'
          scp -r ./public/build git@35.239.181.103:/var/www/html/opzio_erp/public
          scp -r ./public/fonts git@35.239.181.103:/var/www/html/opzio_erp/public
          ssh -o StrictHostKeyChecking=no git@35.239.181.103 'sudo mkdir -p /var/www/html/opzio_erp/public/images'
          scp -r ./public/images/payment-gateways git@35.239.181.103:/var/www/html/opzio_erp/public/images/
        fi
        ssh -o StrictHostKeyChecking=no git@35.239.181.103 'sudo chmod -R 777 /var/www/html/opzio_erp/public'
        

    - name: Deploy .env file
      run: |
        if ssh -o StrictHostKeyChecking=no git@35.239.181.103 '[ ! -f "/var/www/html/opzio_erp/.env" ]'; then
          echo ".env file not found. Copying from repository..."
          scp .env_temp git@35.239.181.103:/var/www/html/opzio_erp/.env
        fi

    - name: Deploy to server
      run: |
        scp build.tar.gz git@35.239.181.103:/var/www/html/opzio_erp
        ssh git@35.239.181.103 << 'EOF'
        cd /var/www/html/opzio_erp
        tar -xzf build.tar.gz
        curl -sS https://getcomposer.org/installer | php8.2
        php8.2 composer.phar install --no-dev --optimize-autoloader
        php8.2 artisan migrate --force
        php8.2 artisan storage:link
        php8.2 artisan config:clear
        php8.2 artisan route:cache
        php8.2 artisan view:cache
        rm build.tar.gz composer.phar
        EOF

    - name: Setting ownership
      run: |
        ssh -o StrictHostKeyChecking=no git@35.239.181.103 'sudo chown -R www-data:www-data /var/www/html/opzio_erp'

    
